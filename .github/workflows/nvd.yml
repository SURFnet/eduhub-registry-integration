name: Check deps for vulnerabilities

on:
  workflow_call:
  schedule:
    - cron: '0 1 * * 1' # every monday
      timezone: Europe/Amsterdam

jobs:
  deps:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v7

    - uses: actions/setup-java@v5
      with:
        distribution: 'temurin'
        java-version: '21'

    - uses: actions/cache@v6
      with:
        key: "clojure-${{ runner.os }}-${{ hashFiles('.github/workflows/install-binaries.sh') }}"
        path: |
          ./bin
          ./lib

    - run: |
        .github/workflows/install-binaries.sh
        echo "${PWD}/bin" >> $GITHUB_PATH

    - id: date-yymmdd
      run: 'echo "date=$(date -u "+%Y%m%d")" >> $GITHUB_OUTPUT'

    - uses: actions/cache@v6
      with:
        path: "~/.m2"
        key: nvd-${{ steps.date-yymmdd.outputs.date }}
        restore-keys: |
          nvd-

    - name: Check clojure dependencies with NVD
      run: make watson
